server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/${SUPPLYCHAIN_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  application:
    name: supply-chain-service
    
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
# Logging level
logging:
  level:
    com.agnesmaria: DEBUG

# 🌐 Inventory service integration
inventory:
  service:
    url: http://inventory-service:8080
